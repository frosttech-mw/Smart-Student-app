<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frost Tech | Smart-Student</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eaf3ff, #f7fbff);
      color: #0b2b44;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 50px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 50px;
      height: 50px;
      border-radius: 15px;
      background: linear-gradient(135deg, #0e3a6b, #051f3a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
    }

    .version {
      padding: 8px 14px;
      background: #e7f1ff;
      border: 1px solid #cfe2ff;
      border-radius: 20px;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #2b4a6a;
    }

    /* FEATURES */
    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
    }

    .features span {
      background: white;
      padding: 10px 15px;
      border-radius: 20px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
      font-weight: 500;
    }

    /* DOWNLOAD */
    .download {
      text-align: center;
      margin: 40px 0;
    }

    .download h2 {
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    /* BUTTONS */
    .btn {
      padding: 14px 22px;
      border-radius: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      transition: 0.25s ease;
      box-shadow: 0 12px 22px rgba(0,0,0,0.08);
      min-width: 180px;
      justify-content: center;
      color: white;
    }

    .btn i {
      font-size: 20px;
    }

    .drive {
      background: linear-gradient(135deg, #0f9d58, #34a853);
    }

    .drive:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px rgba(15,157,88,0.35);
    }

    .dropbox {
      background: linear-gradient(135deg, #0061ff, #3b82f6);
    }

    .dropbox:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px rgba(0,97,255,0.35);
    }

    .mirror {
      background: linear-gradient(135deg, #1f2a44, #3b4b6b);
    }

    .mirror:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 28px rgba(31,42,68,0.35);
    }

    /* GALLERY */
    .gallery {
      margin-top: 60px;
    }

    .gallery h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    /* SLIDER */
    .slider {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 10px 5px 20px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .slider::-webkit-scrollbar {
      display: none;
    }

    .slide {
      min-width: 150px;
      flex: 0 0 auto;
      scroll-snap-align: center;
      border-radius: 16px;
      overflow: hidden;
      background: white;
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
      transition: transform 0.3s;
    }

    .slide:hover {
      transform: translateY(-4px);
    }

    .slide img {
      width: 100%;
      height: 230px;
      object-fit: cover;
      display: block;
    }

    /* FOOTER */
    .footer {
      margin-top: 60px;
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid #d9e8ff;
      color: #2c4f73;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 32px;
      }

      .slide {
        min-width: 130px;
      }

      .slide img {
        height: 200px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="logo"><i class="fas fa-snowflake"></i></div>
      <div>
        <h3>Frost Tech</h3>
        <small>Smart Education</small>
      </div>
    </div>

    <div class="version">
      <i class="fas fa-check-circle"></i> Smart-Student v2.0
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Smart-Student</h1>
    <p>Your digital backpack for books, notes & past papers</p>
  </div>

  <!-- FEATURES -->
  <div class="features">
    <span><i class="fas fa-book"></i> Textbooks</span>
    <span><i class="fas fa-file-alt"></i> Past Papers</span>
    <span><i class="fas fa-notes-medical"></i> Study Notes</span>
    <span><i class="fas fa-wifi"></i> Offline Access</span>
  </div>

  <!-- DOWNLOAD -->
  <div class="download">
    <h2>Download Now</h2>

    <div class="buttons">

      <!-- GOOGLE DRIVE DIRECT -->
      <a class="btn drive"
         href="https://drive.google.com/file/d/1-nmEZRWQtURBBk55UgSNvEI8lItcrzsI/view?usp=drivesdk">
        <i class="fab fa-google-drive"></i> Google Drive
      </a>

      <!-- DROPBOX DIRECT -->
      <a class="btn dropbox"
         href="https://www.dropbox.com/s/YOUR_FILE/SmartStudent.apk?dl=1">
        <i class="fab fa-dropbox"></i> Dropbox
      </a>

      <!-- MIRROR -->
      <a class="btn mirror"
         href="https://your-mirror-link.com/SmartStudent.apk">
        <i class="fas fa-cloud-download-alt"></i> Mirror Link
      </a>

    </div>
  </div>

  <!-- GALLERY -->
  <div class="gallery">
    <h2>App Screenshots</h2>

    <div class="slider">

      <div class="slide"><img src="img1.jpg" alt=""></div>
      <div class="slide"><img src="img2.jpg" alt=""></div>
      <div class="slide"><img src="img3.jpg" alt=""></div>
      <div class="slide"><img src="img4.jpg" alt=""></div>
      <div class="slide"><img src="img5.jpg" alt=""></div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>© 2026 Frost Tech • Smart-Student</p>
  </div>

</div>

</body>
</html>
